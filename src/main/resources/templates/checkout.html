<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .header { background: #000; padding: 15px 30px; color: white; display: flex; justify-content: space-between; }
        .checkout-box { background: white; width: 90%; max-width: 550px; margin: 40px auto; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .summary-card { background: #f8f9fa; border-radius: 12px; padding: 20px; margin: 20px 0; text-align: left; border: 1px solid #eee; }
        .info-section { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px dashed #ccc; }
        .total-price { font-size: 24px; color: #e84118; font-weight: bold; }
        .btn { padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; display: block; margin-bottom: 10px; border: none; font-size: 18px; cursor: pointer; }
        .btn-confirm { background: #2ecc71; color: white; }
        .btn-back { background: #7f8c8d; color: white; font-size: 16px; }
        footer { background: #000; color: white; text-align: center; padding: 20px; margin-top: auto; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" style="color: white; text-decoration: none; font-weight: bold;">🏠 Home</a>
        <span>Final Review</span>
    </div>

    <div class="checkout-box">
        <div style="font-size: 50px;">📦</div>
        <h2>Review Your Order</h2>
        
        <div class="summary-card">
            <div class="info-section">
                <h3 style="font-size: 16px; color: #7f8c8d; margin-top: 0;">SHIPPING TO:</h3>
                <p><strong>Name:</strong> <span th:text="${session.customerName}"></span></p>
                <p><strong>Phone number:</strong> <span th:text="${session.customerPhone}"></span></p>
                <p><strong>Address:</strong> <span th:text="${session.customerAddress}"></span></p>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>Total Items: <strong th:text="${count}"></strong></span>
                <span class="total-price" th:text="${total} + ' JPY'"></span>
            </div>
        </div>

        <a th:href="@{/cart/confirm}" class="btn btn-confirm">Confirm & Purchase</a>
        <a th:href="@{/cart/shipping}" class="btn btn-back">Edit Shipping Info</a>
    </div>

    <footer>
        <div th:text="${shopname}"></div>
        <div style="font-size: 12px; opacity: 0.7;">© 2026 Smartphone Shop</div>
    </footer>
</body>
</html>
