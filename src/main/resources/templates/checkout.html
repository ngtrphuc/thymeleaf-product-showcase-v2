<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #2f3640; padding: 15px 30px; color: white; }
        
        .checkout-box { background: white; width: 90%; max-width: 500px; margin: 60px auto; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .summary-card { background: #f8f9fa; border-radius: 12px; padding: 25px; margin: 25px 0; text-align: left; border: 1px solid #eee; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 18px; }
        .total-price { font-size: 24px; color: #e84118; font-weight: bold; }
        
        .btn { padding: 15px 30px; border-radius: 10px; text-decoration: none; font-weight: bold; display: inline-block; width: 100%; box-sizing: border-box; margin-bottom: 10px; cursor: pointer; border: none; font-size: 18px; }
        .btn-confirm { background: #2ecc71; color: white; }
        .btn-back { background: #7f8c8d; color: white; font-size: 16px; }
        
        footer { background: #2f3640; color: white; text-align: center; padding: 20px; margin-top: auto; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" style="color: white; text-decoration: none; font-weight: bold;">🏠︎ Home/a>
        <span th:text="${shopname}"></span>
        <span></span> </div>

    <div class="checkout-box">
        <div style="font-size: 50px;">📦</div>
        <h2 style="color: #2f3640;">Finalize Order</h2>
        <p style="color: #7f8c8d;">Please check your order summary before purchasing.</p>

        <div class="summary-card">
            <div class="summary-row">
                <span>Items:</span>
                <span th:text="${count}" style="font-weight: bold;"></span>
            </div>
            <div class="summary-row" style="border-top: 1px solid #ddd; padding-top: 15px;">
                <span>Total Amount:</span>
                <span class="total-price" th:text="${total} + ' JPY'"></span>
            </div>
        </div>

        <a th:href="@{/cart/confirm}" class="btn btn-confirm">Confirm & Purchase</a>
        <a th:href="@{/cart}" class="btn btn-back">Back to cart</a>
    </div>

    <footer>
        <div th:text="${shopname}"></div>
        <div th:text="${address}" style="font-size: 12px; opacity: 0.7;"></div>
    </footer>
</body>
</html>
