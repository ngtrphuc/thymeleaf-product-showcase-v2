<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Review Your Order</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="header">
        <a href="/" class="logo">🏠︎ HOME</a>
    </div>

    <div class="checkout-box">
        <div style="font-size: 50px; margin-bottom: 10px;">📦</div>
        <h2 style="margin-top: 0;">Review Your Order</h2>
        
        <div class="summary-card">
            <h3 style="font-size: 13px; color: #7f8c8d; margin-top: 0; text-transform: uppercase;">SHIPPING TO:</h3>
            <p><strong>Name:</strong> <span th:text="${session.customerName}"></span></p>
            <p><strong>Phone Number:</strong> <span th:text="${session.customerPhone}"></span></p>
            <p><strong>Address:</strong> <span th:text="${session.customerAddress}"></span></p>
            
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            
            <div class="summary-line">
                <span>Total Items:</span>
                <strong th:text="${count}"></strong>
            </div>
            <div class="summary-line" style="margin-top: 15px;">
                <span>Total Amount:</span>
                <strong th:text="${total} + ' JPY'" class="price" style="font-size: 18px;"></strong>
            </div>
        </div>

        <a th:href="@{/cart/confirm}" class="btn-confirm" style="display: block; width: 100%; margin-bottom: 12px;">Confirm & Purchase</a>
        <a th:href="@{/cart/shipping}" class="btn-edit-link" style="display: block; width: 100%;">Edit Shipping Info</a>
    </div>

    <footer>
        <div th:text="${shopname}"></div>
    </footer>
</body>
</html>
