<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Smartphone Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="header">
        <a href="/" class="logo">🏠︎ HOME</a>
        <a href="/cart" class="cart">🛒 Cart (<span th:text="${session.cartCount != null ? session.cartCount : 0}">0</span>)</a>
    </div>
    <div class="shop-title-container">
        <h1 class="shop-name" th:text="${shopname}">SHOP NAME</h1>
    </div>
    <div class="search-container">
        <form method="get" action="/">
            <input type="text" name="keyword" placeholder="Search smartphones..." th:value="${keyword}">
            <button type="submit" class="btn-search">Search</button>
        </form>
    </div>
    <div class="container">
        <div class="card" th:each="p : ${phones}">
            <a th:href="@{'/product/' + ${p.id}}" style="text-decoration: none; color: #000;">
                <img th:src="@{${p.image}}" alt="phone">
                <h3 th:text="${p.name}"></h3>
                <p class="price" th:text="${p.price} + ' JPY'"></p>
                <span style="color: #00a8ff; font-weight: bold;">View Details</span>
            </a>
        </div>
    </div>
    <footer>
        <div class="footer-address" th:text="${address}"></div>
        <div style="margin-top: 10px; font-size: 11px; opacity: 0.4;">© 2026 Smartphone Shop</div>
    </footer>
</body>
</html>
