<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Smartphone Shop - Product Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="header">
        <a href="/" class="logo">🏠︎ HOME</a>
        <a href="/cart" class="cart">🛒 Cart (<span th:text="${session.cartCount != null ? session.cartCount : 0}">0</span>)</a>
    </div>

    <div class="container" style="display: flex; gap: 40px; align-items: flex-start;">
        
        <div class="product-img" style="flex: 1;">
            <img th:src="@{${product.image}}" alt="Product" style="width: 100%; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        </div>

        <div class="product-info" style="flex: 1.2;">
            <h1 th:text="${product.name}" style="margin: 0; font-size: 2.2rem;"></h1>
            <p class="price" th:text="${product.price} + ' JPY'" style="font-size: 1.6rem; margin: 15px 0;"></p>
            <p th:text="${product.description}" style="line-height: 1.6; color: #555; margin-bottom: 25px;"></p>

            <h3 style="border-left: 4px solid #000; padding-left: 10px; margin-bottom: 15px;">Product specifications</h3>
            <table class="spec-table">
                <tr><td class="spec-label">OS</td><td class="spec-value" th:text="${product.os}"></td></tr>
                <tr><td class="spec-label">CPU</td><td class="spec-value" th:text="${product.cpu}"></td></tr>
                <tr><td class="spec-label">Frequency</td><td class="spec-value" th:text="${product.speed}"></td></tr>
                <tr><td class="spec-label">RAM</td><td class="spec-value" th:text="${product.ram}"></td></tr>
                <tr><td class="spec-label">Storage</td><td class="spec-value" th:text="${product.storage}"></td></tr>
                <tr><td class="spec-label">Display Size</td><td class="spec-value" th:text="${product.size}"></td></tr>
                <tr><td class="spec-label">Resolution</td><td class="spec-value" th:text="${product.resolution}"></td></tr>
                <tr><td class="spec-label">Battery</td><td class="spec-value" th:text="${product.battery}"></td></tr>
                <tr><td class="spec-label">Charging Power</td><td class="spec-value" th:text="${product.charging}"></td></tr>
            </table>

            <div class="action-buttons">
                <form action="/cart/add" method="get" style="margin: 0;">
                    <input type="hidden" name="id" th:value="${product.id}">
                    <button type="submit" class="btn-cart">Add to Cart</button>
                </form>
                <a href="/" class="btn-back">Back</a>
            </div>
        </div>
    </div>

    <footer>
        <div th:text="${shopname}" style="font-weight: bold; font-size: 20px;"></div>
        <div th:text="${address}" style="opacity: 0.8; margin-top:10px;"></div>
    </footer>
</body>
</html>
