<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shipping Information</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; margin: 0; }
        .header { background: #000; padding: 15px 30px; color: white; display: flex; justify-content: space-between; }
        .container { max-width: 500px; margin: 50px auto; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #2f3640; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .btn-submit { background: #e84118; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-submit:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/cart" style="color: white; text-decoration: none; font-weight: bold;">← Back to Cart</a>
        <span>Checkout Step 1 of 2</span>
    </div>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 30px; color: #000;">Shipping Details</h2>
        <form th:action="@{/cart/process-shipping}" method="post">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="customerName" placeholder="e.g. John Doe" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phoneNumber" placeholder="e.g. 080-1234-5678" required>
            </div>
            <div class="form-group">
                <label>Shipping Address</label>
                <input type="text" name="address" placeholder="Street, City, Province..." required>
            </div>
            <button type="submit" class="btn-submit">Continue to Summary</button>
        </form>
    </div>
</body>
</html>
