<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Smartphone Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="header">
        <a href="/" class="logo">🏠︎ HOME</a>
        <a href="/cart" class="cart">🛒 Cart (<span th:text="${session.cartCount != null ? session.cartCount : 0}">0</span>)</a>
    </div>

    <div class="container">
        <h2 style="border-bottom: 2px solid #000; padding-bottom: 10px;">Your Shopping Bag</h2>
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cart}">
                    <td th:text="${item.name}" style="font-weight: bold;"></td>
                    <td th:text="${item.price} + ' JPY'"></td>
                    <td>
                        <a th:href="@{/cart/decrease/{id}(id=${item.id})}" class="qty-btn">−</a>
                        <span th:text="${item.quantity}" style="margin: 0 10px;"></span>
                        <a th:href="@{/cart/increase/{id}(id=${item.id})}" class="qty-btn">+</a>
                    </td>
                    <td th:text="${item.totalPrice} + ' JPY'" style="color: #e84118; font-weight: bold;"></td>
                    <td><a th:href="@{/cart/remove/{id}(id=${item.id})}" style="text-decoration: none;">❌</a></td>
                </tr>
            </tbody>
        </table>

        <div th:if="${!#lists.isEmpty(cart)}" style="text-align: right; margin-top: 30px;">
            <p style="font-size: 24px; font-weight: bold;">Total: <span th:text="${total}" style="color: #e84118;"></span> JPY</p>
            <div class="action-buttons" style="justify-content: flex-end;">
                <a href="/" class="btn-back">KEEP SHOPPING</a>
                <a href="/cart/shipping" class="btn-checkout">BUY NOW</a>
            </div>
        </div>
    </div>

    <footer>
        <div th:text="${shopname}"></div>
        <div th:text="${address}" style="opacity: 0.8; font-size: 14px; margin-top: 10px;"></div>
    </footer>
</body>
</html>
