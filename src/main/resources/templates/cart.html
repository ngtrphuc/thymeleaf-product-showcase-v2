<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #000000; padding: 15px 30px; color: white; }
        .logo, .cart { color: white; font-weight: bold; text-decoration: none; }
        .cart { background: #000; padding: 8px 18px; border-radius: 25px; border: 1.5px solid #fff; }

        .container { max-width: 1100px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .cart-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .cart-table th { background: #f8f9fa; padding: 15px; text-align: left; }
        .cart-table td { padding: 20px 15px; border-bottom: 1px solid #eee; }
        
        .qty-btn { width: 25px; height: 25px; background: #000; color: white; border-radius: 5px; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
        
        .btn { padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; display: inline-block; }
        .btn-checkout { background: #e84118; color: white; }
        .btn-back { background: #000; color: white; }

        footer { background: #000; color: white; text-align: center; padding: 40px; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="logo">🏠︎ HOME</a>
        <a href="/cart" class="cart">🛒 Cart (<span th:text="${session.cartCount != null ? session.cartCount : 0}">0</span>)</a>
    </div>

    <div class="container">
        <h2 style="border-bottom: 2px solid #000; padding-bottom: 10px;">Your Shopping Bag</h2>
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cart}">
                    <td th:text="${item.name}" style="font-weight: bold;"></td>
                    <td th:text="${item.price} + ' JPY'"></td>
                    <td>
                        <a th:href="@{/cart/decrease/{id}(id=${item.id})}" class="qty-btn">−</a>
                        <span th:text="${item.quantity}" style="margin: 0 10px;"></span>
                        <a th:href="@{/cart/increase/{id}(id=${item.id})}" class="qty-btn">+</a>
                    </td>
                    <td th:text="${item.totalPrice} + ' JPY'" style="color: #e84118; font-weight: bold;"></td>
                    <td><a th:href="@{/cart/remove/{id}(id=${item.id})}" style="text-decoration: none;">❌</a></td>
                </tr>
            </tbody>
        </table>

        <div th:if="${!#lists.isEmpty(cart)}" style="text-align: right; margin-top: 30px;">
            <p style="font-size: 24px; font-weight: bold;">Total: <span th:text="${total}" style="color: #e84118;"></span> JPY</p>
            <div style="margin-top: 20px;">
                <a href="/" class="btn btn-back">KEEP SHOPPING</a>
                <a href="/cart/checkout" class="btn btn-checkout">BUY NOW</a>
            </div>
        </div>
    </div>

    <footer>
        <div th:text="${shopname}"></div>
        <div th:text="${address}" style="opacity: 0.8; font-size: 14px; margin-top: 10px;"></div>
    </footer>
</body>
</html>
