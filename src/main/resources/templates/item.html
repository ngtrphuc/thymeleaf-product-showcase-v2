<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title th:text="${itemName} + ' - 詳細'">詳細を見る</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <h2 th:text="${itemName}">製品名</h2>
    <div class="item-container">
        <div class="item-image"> <img th:src="@{${image}}" alt="製品画像" width="300" /> </div>
        <div class="item-details">
            <p><strong>説明:</strong> <span th:text="${description}">-</span></p>
            <p><strong>価格:</strong> <span th:text="${price} + '円'">0円</span></p>
            <p><strong>OS:</strong> <span th:text="${os}">-</span></p>
            <p><strong>RAM:</strong> <span th:text="${ram}">-</span></p>
            <p><strong>CPU:</strong> <span th:text="${cpu}">-</span></p>
            <p><strong>CPU速度:</strong> <span th:text="${speed}">-</span></p>
            <p><strong>ストレージ:</strong> <span th:text="${storage}">-</span></p>
            <table class="spec-table">
                <tr>
                    <th>画面サイズ</th>
                    <td th:text="${size}">-</td>
                </tr>
                <tr>
                    <th>画面解像度</th>
                    <td th:text="${resolution}">-</td>
                </tr>
                <tr>
                    <th>バッテリー容量</th>
                    <td th:text="${battery}">-</td>
                </tr>
                <tr>
                    <th>充電出力</th>
                    <td th:text="${charging}">-</td>
                </tr>
            </table>
        </div>
    </div> <a href="/" class="back-button">← 戻る</a>
</body>

</html>
